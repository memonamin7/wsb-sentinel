<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WSB Sentinel Offline</title>
<style>
body{margin:0;background:#080808;color:#ccc;font-family:Courier New,monospace}
.header{padding:16px 22px;border-bottom:1px solid #151515;background:#0b0b0b}
.logo{color:#00ff88;font-weight:bold;letter-spacing:3px}
.container{max-width:1000px;margin:auto;padding:24px}
button{background:transparent;border:1px solid #00ff88;color:#00ff88;padding:12px 26px;cursor:pointer}
.terminal,.card{background:#0d0d0d;border:1px solid #1a1a1a}
.terminal{padding:18px;height:220px;overflow:auto;margin-top:20px}
.card{padding:14px;margin-top:18px}
.row{display:grid;grid-template-columns:60px 100px 1fr 120px 100px;gap:10px;padding:10px;border-bottom:1px solid #151515}
.green{color:#00ff88}.red{color:#ff4466}.orange{color:#ff8844}
.bar{height:5px;background:#151515;border-radius:10px;overflow:hidden;margin-top:5px}
.hot{color:#ff8844;margin:16px 0}
@media(max-width:700px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
<div class="logo">WSB SENTINEL</div>
<div id="time"></div>
</div>

<div class="container">
<div class="hot" id="hot"></div>
<button onclick="runAnalysis()">RUN ANALYSIS</button>

<div class="terminal" id="terminal"></div>

<div class="card">
Fear & Greed Index: <span class="green" id="fear">--</span><br><br>
Posts Scanned: <span class="green" id="posts">--</span>
</div>

<div class="card">
<div class="row"><b>#</b><b>TICKER</b><b>STOCK</b><b>MENTIONS</b><b>7D</b></div>
<div id="stocks"></div>
</div>
</div>

<script>
const HOT=[
"NVDA calls curing portfolio depression",
"PLTR bagholders entering enlightenment phase",
"TSLA bulls pricing in Mars colony revenues",
"AI infrastructure still dominating discussion",
"Nuclear energy becoming the new meme trade"
];

const DATA=[
{ticker:"NVDA",name:"NVIDIA",mentions:2410,change:32,context:"AI datacenter spending remains dominant"},
{ticker:"PLTR",name:"Palantir",mentions:1980,change:24,context:"Retail traders discussing AI contracts"},
{ticker:"TSLA",name:"Tesla",mentions:1850,change:-8,context:"Robotaxi and autonomy speculation"},
{ticker:"AMD",name:"AMD",mentions:1620,change:14,context:"AI accelerator competition"},
{ticker:"META",name:"Meta",mentions:1490,change:18,context:"AI monetization and advertising"},
{ticker:"AAPL",name:"Apple",mentions:1360,change:6,context:"Device ecosystem discussion"},
{ticker:"MSFT",name:"Microsoft",mentions:1280,change:11,context:"Cloud and AI leadership"},
{ticker:"AMZN",name:"Amazon",mentions:1160,change:9,context:"AWS growth expectations"},
{ticker:"GME",name:"GameStop",mentions:920,change:-12,context:"Meme stock revival chatter"},
{ticker:"SOFI",name:"SoFi",mentions:810,change:17,context:"Fintech growth optimism"}
];

function log(t,c="#00ff88"){
 let d=document.createElement("div");
 d.style.color=c;
 d.style.marginBottom="8px";
 d.innerText=t;
 terminal.appendChild(d);
 terminal.scrollTop=terminal.scrollHeight;
}

async function runAnalysis(){
 terminal.innerHTML="";
 document.getElementById("stocks").innerHTML="";

 const steps=[
 ["$ INITIALIZING WSB SENTINEL...","#00ff88"],
 ["$ Connecting to sentiment cache...","#00aaff"],
 ["$ Loading discussion dataset...","#ffcc00"],
 ["$ Running ticker extraction...","#00aaff"],
 ["$ Calculating sentiment...","#ffcc00"],
 ["$ Ranking mentions...","#aa88ff"]
 ];

 for(const s of steps){
   log(s[0],s[1]);
   await new Promise(r=>setTimeout(r,500));
 }

 document.getElementById("fear").innerText=72;
 document.getElementById("posts").innerText="12,842";

 const holder=document.getElementById("stocks");

 DATA.forEach((s,i)=>{
   let row=document.createElement("div");
   row.className="row";
   row.innerHTML=`
   <div>#${i+1}</div>
   <div><b>${s.ticker}</b></div>
   <div>
      ${s.name}<br>
      <span style="font-size:11px;color:#666">${s.context}</span>
      <div class="bar">
        <div style="height:100%;width:${Math.min(100,s.mentions/25)}%;background:#00ff88"></div>
      </div>
   </div>
   <div>${s.mentions.toLocaleString()}</div>
   <div class="${s.change>=0?'green':'red'}">${s.change>=0?'+':''}${s.change}%</div>`;
   holder.appendChild(row);
 });

 log("$ Analysis complete","#00ff88");
}

setInterval(()=>{
 document.getElementById("hot").innerText="⚡ HOT TAKE: "+HOT[Math.floor(Math.random()*HOT.length)];
},2500);

setInterval(()=>{
 document.getElementById("time").innerText=new Date().toUTCString();
},1000);
</script>
</body>
</html>
